services:
  - type: web
    name: marketpulse-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: Default_Gemini_API_Key
        sync: false
      - key: GEMINI_PROJECT_ID
        sync: false
