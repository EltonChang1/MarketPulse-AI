services:
  - type: web
    name: marketpulse-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: Default_Gemini_API_Key
        sync: false
      - key: GEMINI_PROJECT_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AGENT_OPENAI_MODEL
        sync: false
      - key: HARNESS_SERVER_URL
        sync: false
      - key: HARNESS_UPSTREAM_TOKEN
        sync: false
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
      - key: INTERNAL_API_TOKEN
        sync: false
      - key: AGENT_RATE_LIMIT_PER_MINUTE
        sync: false
      - key: AGENT_MAX_MESSAGE_CHARS
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: ENABLE_REPORT_CRON
        value: "false"
